name: wealthpilot
description: WealthPilot - Your AI guide to smarter investing
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  lottie: ^3.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3

  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
